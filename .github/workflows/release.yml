name: build-and-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore GARbro.sln

      - name: Fetch .NET Framework 4.6 reference assemblies
        # GitHub runners ship newer targeting packs but not v4.6; this package
        # supplies the v4.6 reference assemblies so we build without retargeting.
        run: nuget install Microsoft.NETFramework.ReferenceAssemblies.net46 -Version 1.0.3 -OutputDirectory packages -ExcludeVersion

      - name: Build (Release)
        shell: pwsh
        run: |
          $ref = Join-Path $PWD 'packages\Microsoft.NETFramework.ReferenceAssemblies.net46\build\.NETFramework\v4.6'
          msbuild ArcFormats\ArcFormats.csproj /p:Configuration=Release /p:FrameworkPathOverride="$ref" /m
          msbuild Console\GARbro.Console.csproj /p:Configuration=Release /p:FrameworkPathOverride="$ref" /m

      - name: Package
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { 'dev' }
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force pkg  | Out-Null
          Copy-Item 'bin\Release\*' pkg -Recurse -Force
          # drop debug symbols and xml docs from the shipped zip
          Get-ChildItem pkg -Recurse -Include *.pdb,*.xml | Remove-Item -Force
          Compress-Archive -Path 'pkg\*' -DestinationPath "dist\garbro-cli-$ver-win.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: garbro-cli-win
          path: dist/*.zip

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
