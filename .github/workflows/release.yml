name: build-and-release

on:
  push:
    # Only this fork's own releases. Upstream GARbro carries ~50 legacy
    # v1.x tags that would otherwise fire this workflow; scope the trigger
    # to the fork's v0.* series. Bump the pattern (e.g. add 'v1.*') only
    # when this fork intentionally moves to a new major version line.
    tags: ['v0.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore GARbro.sln

      - name: Fetch .NET Framework 4.6 reference assemblies
        # GitHub runners ship newer targeting packs but not v4.6; this package
        # supplies the v4.6 reference assemblies so we build without retargeting.
        run: nuget install Microsoft.NETFramework.ReferenceAssemblies.net46 -Version 1.0.3 -OutputDirectory packages -ExcludeVersion

      - name: Build (Release)
        shell: pwsh
        run: |
          $ref = Join-Path $PWD 'packages\Microsoft.NETFramework.ReferenceAssemblies.net46\build\.NETFramework\v4.6'
          $referencePath = "$ref;$ref\Facades"

          msbuild ArcFormats\ArcFormats.csproj /p:Configuration=Release /p:FrameworkPathOverride="$ref" /p:ReferencePath="$referencePath" /m
          if ($LASTEXITCODE -ne 0) { throw "ArcFormats Release build failed with exit code $LASTEXITCODE." }

          msbuild Console\GARbro.Console.csproj /p:Configuration=Release /p:FrameworkPathOverride="$ref" /p:ReferencePath="$referencePath" /m
          if ($LASTEXITCODE -ne 0) { throw "GARbro.Console Release build failed with exit code $LASTEXITCODE." }

      - name: Verify release build
        shell: pwsh
        run: .\scripts\verify-release.ps1

      - name: Package
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { 'dev' }
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force pkg  | Out-Null
          Copy-Item 'bin\Release\*' pkg -Recurse -Force
          # drop debug symbols and xml docs from the shipped zip.
          # NB: -Include only matches when the path ends in \*, so glob pkg\*.
          Get-ChildItem pkg\* -Recurse -Include *.pdb,*.xml | Remove-Item -Force
          # bundle license / notice files. The default-build ArcFormats.dll is
          # MIT-clean, but NOTICE documents the opt-in INCLUDE_GPL build and the
          # GPL-2.0 text is retained for that case.
          Copy-Item LICENSE,NOTICE pkg -Force
          New-Item -ItemType Directory -Force pkg\licenses | Out-Null
          Copy-Item licenses\GPL-2.0.txt pkg\licenses -Force
          $zip = "dist\garbro-cli-$ver-win.zip"
          Compress-Archive -Path 'pkg\*' -DestinationPath $zip -Force
          # compute and surface the SHA-256 of the release archive
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash
          "SHA256 ($zip) = $sha" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "SHA256=$sha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: garbro-cli-win
          path: dist/*.zip

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            SHA-256 of the release archive:

            ```
            ${{ env.SHA256 }}
            ```
